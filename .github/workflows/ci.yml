name: ci

# CI 测试流水线 (#6015)。
# 背景：#6013 —— PR #5333 合并时无 CI 拦截，user_crud.py IndentationError
# 直接进 master 瘫痪所有 CLI 命令。此前 .github/workflows/ 仅有 label 清理，
# 零测试流水线。本 workflow 最低限度补齐：语法检查 + 关键 mock/import smoke。
#
# 分层（记忆约束）：
#   - py_compile 全 src/api：零依赖、秒级，直接抓 IndentationError/SyntaxError
#   - smoke-tests：装依赖跑 user_crud_mock（验收点名）+ containers import。
#     严禁跑全量（test_oom_investigation: ~20GB OOM）；不混 api/unit 测试
#     (project_api_unit_test_namespace_pollution: ModuleNotFoundError)。
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  syntax-check:
    name: Syntax check (py_compile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: py_compile src/ and api/
        run: |
          set -uo pipefail
          # 对 src/ + api/ 下所有 .py 跑字节码编译。
          # py_compile 不 import 依赖，纯语法/缩进检查 —— 零误报、抓 #6013 回归。
          fail=0
          while IFS= read -r -d '' f; do
            if ! python -m py_compile "$f" 2> /tmp/pyc_err; then
              echo "::error file=${f},line=1::py_compile 失败"
              cat /tmp/pyc_err
              fail=1
            fi
          done < <(find src api -name "*.py" -not -path "*/__pycache__/*" -print0)
          if [ "$fail" -ne 0 ]; then
            echo "❌ 存在语法/缩进错误，拒绝合并（防 #6013 回归）"
            exit 1
          fi
          echo "✅ 所有 src/api .py 通过 py_compile"

  smoke-tests:
    name: Smoke tests (mock + import)
    runs-on: ubuntu-latest
    env:
      # containers.py 在 import 时（class body, fail-fast 架构 #6024）读 GCONF
      # MongoDB 凭据；CI 无 secure.yml，注入占位值让 import 通过。
      # smoke 测的是 import 链 + mock，不真连 MongoDB。
      GINKGO_SKIP_DEBUG_CHECK: "1"  # 豁免 conftest DEBUG 检查（CI 不开 debug）
      GINKGO_MONGODB_USERNAME: ci
      GINKGO_MONGODB_PASSWORD: ci
      GINKGO_MONGODB_HOST: localhost
      GINKGO_MONGODB_PORT: "27017"
      GINKGO_MONGODB_DATABASE: ginkgo_ci
      TERM: dumb  # GITHUB_ACTIONS=true 致 typer/rich 强制 colorize，--name 被 ANSI 分隔使断言失败；TERM=dumb 禁 color（NO_COLOR 无效，rich 只认 TERM）
    steps:
      - uses: actions/checkout@v4
        with:
          # diff coverage gate (#6135) runs `git diff <pr base.sha> <head>`;
          # the base commit is absent in a depth-1 clone → "unknown revision".
          # Full history only needed in this job (the one that runs the gate).
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install uv
        # pyproject 用 uv 专有字段（override-dependencies）+ uv.lock 管理依赖；
        # pip 不读 override-dependencies 致 ResolutionImpossible（首版 CI 实跑 failure）。
        # uv sync --frozen 按 uv.lock 锁定版本装，不解析、不报 drift——
        # master uv.lock 存在 pre-existing drift（滞后 pyproject），--locked 会立即报红；
        # --frozen 只按 lock 现状装，不校验 lock↔pyproject 一致，故 drift 不阻断。
        # --extra dev：pyproject required_plugins=["pytest-cov","pytest-timeout"]，
        # pytest-timeout 只在 [project.optional-dependencies].dev；主依赖仅 pytest-cov
        # （传递拉入 pytest 本体）。缺 --extra dev 则 pytest-timeout 缺失致 pytest exit 4。
        # astral-sh/setup-uv 未发布 v8 major rolling tag（仅 v8.0.0/v8.1.0/v8.2.0），
        # @v8 解析失败；用具体版本 v8.2.0 可复现。
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Sync deps (frozen, +dev for pytest plugins)
        run: uv sync --frozen --extra dev --python 3.12
      - name: user_crud mock tests (#6015 点名)
        run: |
          uv run python -m pytest tests/unit/data/crud/test_user_crud_mock.py \
            -q -o "addopts=" --no-header --tb=short
      - name: containers import smoke (#6015 点名)
        # test_containers.py 本身是 features.containers 的 import smoke（带 ImportError 容错 skip）
        run: |
          uv run python -m pytest tests/unit/features/test_containers.py \
            -q -o "addopts=" --no-header --tb=short
      - name: user_cli tests (#6015 点名)
        # test_user_cli.py 覆盖 #6013 崩溃链 CLI 层（CLI → containers → user_crud），
        # user_crud.py IndentationError 时必失败。单文件 pytest 不触发 client 全目录
        # 跨测试污染（记忆 project-client-test-state-pollution：污染仅在 client 全目录跑时发生）。
        run: |
          uv run python -m pytest tests/unit/client/test_user_cli.py \
            -q -o "addopts=" --no-header --tb=short
      - name: page_size passthrough smoke (#6652 ADR-021 L139)
        # service 层 page_size 透传 crud 的 3 个出口方法（engine get_engines_df/
        # fuzzy_search、portfolio get_portfolios_df）被 containers import 链触达
        # （class 定义行 executed → 非 exempt）但 smoke 不调其方法体，函数体内
        # page_size 透传行无覆盖信号。此处用 mock 依赖补信号，供 #6685 门禁采集。
        run: |
          uv run python -m pytest tests/unit/data/services/test_page_size_passthrough_smoke.py \
            -q -o "addopts=" --no-header --tb=short
      - name: list count_X smoke (#5009 metadata.total)
        # count_signals/count_orders/count_records/count_positions + get_positions_df(page=)
        # 是本 PR 新增可执行行，被 containers import 链触达但 smoke 不调方法体 → 门禁红。
        # 用 mock 依赖（result count_positions/get_positions_df inline 实例化 PositionRecordCRUD
        # → patch 类构造）补覆盖信号。
        run: |
          uv run python -m pytest tests/unit/data/services/test_list_count_smoke.py \
            -q -o "addopts=" --no-header --tb=short
      - name: Diff coverage gate (#6135)
        if: github.event_name == 'pull_request'
        # 阈值按 #6132 基线后采用温和默认：只约束 PR 新增/改动的可执行 src/api 行，
        # 不把当前全仓 6.85% smoke baseline 当作质量目标；无 src/api 改动时跳过。
        run: |
          uv run python -m pytest \
            tests/unit/data/crud/test_user_crud_mock.py \
            tests/unit/features/test_containers.py \
            tests/unit/client/test_user_cli.py \
            tests/unit/data/mappers/test_bar_mapper.py \
            tests/unit/data/services/test_page_size_passthrough_smoke.py \
            tests/unit/data/services/test_list_count_smoke.py \
            --cov=src/ginkgo \
            --cov=api \
            --cov-report=json:coverage.json \
            --cov-report=term-missing:skip-covered \
            -q -o "addopts=" --no-header --tb=short
          uv run python scripts/check_diff_coverage.py \
            --coverage-json coverage.json \
            --base "${{ github.event.pull_request.base.sha }}" \
            --head "${{ github.event.pull_request.head.sha }}" \
            --threshold 80
