  #     ACCESS_TOKEN_EXPIRE_MINUTES: 1440
  #     # CORS配置
  #     CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}
  #     # 调试模式
  #     DEBUG: "False"
  #     # MySQL配置
  #     GINKGO_MYSQLHOST: mysql-master
  #     GINKGO_MYSQLPORT: 3306
  #     GINKGO_MYSQLUSER: ${MYSQL_USER}
