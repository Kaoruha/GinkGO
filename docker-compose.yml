# yaml 配置实例
name: ginkgo

x-worker-common: &worker-common
  build:
    context: .
    dockerfile: .conf/Dockerfile.ginkgo
  image: ginkgo/worker:latest
  restart: always
  logging:
    driver: "json-file"
    options:
      max-size: "100m"
      max-file: "3"
  depends_on:
    - kafka1
    - redis-master
    - mongo-master
    - clickhouse-test
  environment: &worker-env
    # 确定性声明容器身份：触发 is_container_environment() 返 True（不依赖隐式 /.dockerenv）。
    # config.py 的 CLICKPORT/MYSQLPORT +1 守卫据此跳过 +1，使容器内服务连内部端口 3306/8123
    # 而非宿主映射端口（ADR-024，修复 TaskTimer→DataWorker 连 mysql-test:13306 ECONNREFUSED）。
    DOCKER_CONTAINER: "true"
    GINKGO_KAFKA_HOST: kafka1
    GINKGO_KAFKA_PORT: 9092
    GINKGO_REDIS_HOST: redis-master
    GINKGO_REDIS_PORT: 6379
    GINKGO_MONGODB_HOST: ${GINKGO_MONGODB_HOST:-mongo-master}
    GINKGO_MONGODB_PORT: ${GINKGO_MONGODB_PORT:-27017}
    GINKGO_MONGODB_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
    GINKGO_MONGODB_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    GINKGO_MONGODB_DATABASE: ginkgo
    GINKGO_CLICKHOUSE_HOST: ${GINKGO_CLICKHOUSE_HOST:-clickhouse-test}
    GINKGO_CLICKHOUSE_PORT: ${GINKGO_CLICKHOUSE_PORT:-8123}
    GINKGO_CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
    GINKGO_CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-""}
    GINKGO_CLICKHOUSE_DATABASE: ginkgo
    GINKGO_MYSQL_HOST: ${GINKGO_MYSQL_HOST:-mysql-test}
    GINKGO_MYSQL_PORT: ${GINKGO_MYSQL_PORT:-3306}
    GINKGO_MYSQL_USER: ${MYSQL_USER}
    GINKGO_MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    GINKGO_MYSQL_DATABASE: ginkgo
    GINKGO_LOG_PATH: /var/log/ginkgo
    GINKGO_LOG_FILE_ON: "True"
    LOG_LEVEL: INFO
    LOGGING_MODE: container
    GINKGO_LOG_LEVEL_CONSOLE: INFO
    GINKGO_LOG_LEVEL_FILE: INFO
    PYTHONUNBUFFERED: 1
    TZ: Asia/Shanghai
    TUSHARE_TOKEN: ${TUSHARE_TOKEN}
  volumes:
    - ginkgo-logs:/var/log/ginkgo
    # 统一图式：容器 /home/ginkgo/.ginkgo = 宿主机 ~/.ginkgo（真实配置，非模板）
    # GCONF 检测到文件存在会跳过运行时拷贝（idempotent），volume 提供真实配置
    # 目标路径对齐 master #6651 的非 root 用户（ginkgo, HOME=/home/ginkgo）
    - ${HOME}/.ginkgo:/home/ginkgo/.ginkgo:ro

services:
  # webui:
  #   image: ginkgo/webui:latest
  #   container_name: ginkgo-web-ui
  #   restart: always
  #   logging:
  #     driver: "json-file"
  #     options:
  #       max-size: "100m"
  #       max-file: "3"
  #   build:
  #     context: .
  #     dockerfile: .conf/Dockerfile.web
  #   ports:
  #     - '127.0.0.1:8080:8080'
  #   volumes:
  #     - .conf/nginx.conf:/etc/nginx/nginx.conf
  kafka1:
    image: apache/kafka:4.0.0
    restart: always
    container_name: ginkgo-kafka1
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - '127.0.0.1:9092:29092'
      - '127.0.0.1:9093:9093'
    environment:
      # KRaft 模式配置 (apache/kafka 使用 KAFKA_ 前缀)
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=1
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka1:9092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      # 其他配置
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-false}
      - KAFKA_HEAP_OPTS=-Xmx512M -Xms256M
      # 日志配置
      - KAFKA_LOG_RETENTION_HOURS=2
      - KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=300000
      - KAFKA_LOG_SEGMENT_BYTES=1073741824
      - KAFKA_LOG_CLEANUP_POLICY=delete
    volumes:
      - .db/kafka1_data:/var/lib/kafka/data
  kafka2:
    image: apache/kafka:4.0.0
    restart: always
    container_name: ginkgo-kafka2
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - '127.0.0.1:9094:29094'
      - '127.0.0.1:9095:9093'
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=2
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29094,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka2:9092,PLAINTEXT_HOST://localhost:9094
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LOG_RETENTION_HOURS=2
      - KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=300000
      - KAFKA_LOG_SEGMENT_BYTES=1073741824
      - KAFKA_LOG_CLEANUP_POLICY=delete
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-false}
      - KAFKA_HEAP_OPTS=-Xmx512M -Xms256M
    volumes:
      - .db/kafka2_data:/var/lib/kafka/data
  kafka3:
    image: apache/kafka:4.0.0
    restart: always
    container_name: ginkgo-kafka3
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - '127.0.0.1:9096:29096'
      - '127.0.0.1:9097:9093'
    environment:
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_NODE_ID=3
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka1:9093,2@kafka2:9093,3@kafka3:9093
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29096,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka3:9092,PLAINTEXT_HOST://localhost:9096
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LOG_RETENTION_HOURS=2
      - KAFKA_LOG_RETENTION_CHECK_INTERVAL_MS=300000
      - KAFKA_LOG_SEGMENT_BYTES=1073741824
      - KAFKA_LOG_CLEANUP_POLICY=delete
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=3
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-false}
      - KAFKA_HEAP_OPTS=-Xmx512M -Xms256M
    volumes:
      - .db/kafka3_data:/var/lib/kafka/data
  redis-master:
    image: redis:alpine3.18
    container_name: ginkgo-redis-master
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - .conf/redis.conf:/etc/redis/redis.conf
      - .db/redis/data:/data
    command: redis-server /etc/redis/redis.conf --maxmemory 20480mb
  mysql-master:
    image: mysql:8.2.0
    container_name: ginkgo-mysql-master
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    command:
      --max_connections=1000
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --default-time-zone='+08:00'
    restart: always
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ginkgo
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - .logs/mysql:/logs
      - .db/mysql:/var/lib/mysql
      - .conf/mysql_entrypoint:/docker-entrypoint-initdb.d

  mysql-test:
    image: mysql:8.2.0
    container_name: ginkgo-mysql-test
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    command:
      --max_connections=1000
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_general_ci
      --default-time-zone='+08:00'
    restart: always
    ports:
      - "127.0.0.1:13306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ginkgo
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - .logs/mysql_test:/logs
      - .db/mysql_test:/var/lib/mysql
      - .conf/mysql_entrypoint:/docker-entrypoint-initdb.d
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 4096M

  clickhouse-master:
    image: clickhouse/clickhouse-server:24.8.4.13-alpine
    container_name: ginkgo-clickhouse-master
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - "127.0.0.1:8123:8123"
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9009:9009"
    volumes:
      - .logs/clickhouse:/var/log/clickhouse-server
      - .conf/clickhouse_users.xml:/etc/clickhouse-server/users.xml
      - .conf/clickhouse_log_config.xml:/etc/clickhouse-server/config.d/logger.xml:ro
      - .db/clickhouse:/var/lib/clickhouse:rw
    ulimits:
      nproc: 65546
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: ginkgo
      SHOW: 'true'

  clickhouse-test:
    image: clickhouse/clickhouse-server:24.8.4.13-alpine
    container_name: ginkgo-clickhouse-test
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - "127.0.0.1:18123:8123"
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19009:9009"
    volumes:
      - .logs/clickhouse_test:/var/log/clickhouse-server
      - .conf/clickhouse_users.xml:/etc/clickhouse-server/users.xml
      - .conf/clickhouse_log_config.xml:/etc/clickhouse-server/config.d/logger.xml:ro
      - .db/clickhouse_test:/var/lib/clickhouse:rw
    ulimits:
      nproc: 65546
      nofile:
        soft: 262144
        hard: 262144
    environment:
      CLICKHOUSE_DB: ginkgo
      SHOW: 'true'
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 4096M
  # Loki Stack - 已弃用，改用 Vector + ClickHouse
  # loki:
  #   image: grafana/loki:main-84ffd0d
  #   container_name: ginkgo-loki
