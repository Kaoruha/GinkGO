  #         memory: 128M

  grafana:
    image: grafana/grafana:main-ubuntu
    container_name: ginkgo-grafana
    restart: always
    user: "472"
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-change-me-randomize-in-env}
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-clickhouse-datasource
    volumes:
      - grafana-storage:/var/lib/grafana
      # Grafana provisioning 配置（自动添加数据源）
      - .conf/grafana-provisioning:/etc/grafana/provisioning:ro
    # depends_on:
    #   - loki  # 已移除 Loki，改用 ClickHouse
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.10'
          memory: 128M

  # Vector - Log collection and routing to ClickHouse
  vector:
    image: timberio/vector:0.39.0-alpine
    container_name: ginkgo-vector
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - "127.0.0.1:8686:8686"  # Vector metrics API
    volumes:
      # Vector configuration
      - .conf/vector.toml:/etc/vector/vector.toml:ro
      # Log files to collect (shared named volume with workers)
      - ginkgo-logs:/var/log/ginkgo:ro
      # Vector data directory for checkpoint positions (read-write)
      - vector-data:/vector-data
    command: --config /etc/vector/vector.toml
    environment:
      - GINKGO_LOG_PATH=/var/log/ginkgo
      - CLICKHOUSE_HOST=${GINKGO_CLICKHOUSE_HOST:-clickhouse-test}
    depends_on:
      - clickhouse-master
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:8686/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Mongo
  mongo-master:
    image: 'mongo:6.0.27-jammy'
    container_name: ginkgo-mongo-master
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"
    ports:
      - '127.0.0.1:27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - .db/mongo:/data/db
      - .logs/mongo:/var/log/mongodb
      - .conf/mongo_entrypoint:/docker-entrypoint-initdb.d
  # Notification Worker - 通知消息处理
  notify-worker:
    <<: *worker-common
    container_name: ginkgo-notify-worker
    command: ["python", "main.py", "serve", "worker-notify"]
    environment:
      <<: *worker-env
      WORKER_GROUP_ID: notification_worker_group
      # 通知系统配置
      GINKGO_NOTIFICATION_DISCORD_TIMEOUT: 3
      GINKGO_NOTIFICATION_EMAIL_TIMEOUT: 10
      GINKGO_NOTIFICATION_DISCORD_MAX_RETRIES: 3
      GINKGO_NOTIFICATION_EMAIL_MAX_RETRIES: 3
      # Email SMTP 配置
      GINKGO_SMTP_HOST: ${EMAIL_SMTP_HOST}
      GINKGO_SMTP_PORT: ${EMAIL_SMTP_PORT}
      GINKGO_SMTP_USER: ${EMAIL_SMTP_USER}
      GINKGO_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD}
      GINKGO_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS}
      GINKGO_FROM_NAME: ${EMAIL_FROM_NAME:-Ginkgo Notification}
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'python main.py serve worker-notify' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # TaskTimer - 定时任务调度器
  tasktimer:
    <<: *worker-common
    container_name: ginkgo-tasktimer
    command: ["python", "main.py", "serve", "tasktimer"]
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 256M
        reservations:
          cpus: '0.10'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'python main.py serve tasktimer' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # LiveCore - 实盘交易控制平面容器
  livecore:
    <<: *worker-common
    container_name: ginkgo-livecore
    command: ["python", "main.py", "serve", "livecore"]
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'python main.py serve livecore' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Data Worker - 数据采集Worker
  data-worker:
    <<: *worker-common
    command: ["python", "main.py", "serve", "worker-data"]
    environment:
      <<: *worker-env
      WORKER_GROUP_ID: data-worker-group
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'python main.py serve worker-data' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ExecutionNode - 实盘交易执行节点
  execution-node:
    <<: *worker-common
    command: ["python", "main.py", "serve", "execution"]
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'python main.py serve execution' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # BacktestWorker - 回测任务执行节点
  backtest-worker:
    <<: *worker-common
    command: ["python", "main.py", "serve", "worker-backtest", "--id", "${BACKTEST_WORKER_ID:-bw-1}"]
    environment:
      <<: *worker-env
      BACKTEST_WORKER_ID: ${BACKTEST_WORKER_ID:-bw-1}
    deploy:
      resources:
        limits:
          cpus: '2.00'
          memory: 2G
        reservations:
          cpus: '0.50'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "cat /proc/1/cmdline | tr '\\0' ' ' | grep -q 'python main.py serve worker-backtest' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API Server - FastAPI REST API和WebSocket服务
